<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro - FalleN</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/cadastro.css" />
    <link rel="icon" type="image/png" href="./assets/imgs/badfallen.png">
</head>
<script src="./js/sessao.js"></script>

<body>
    <header>
        <div class="logo">FALLEN</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="historia.html">HISTÓRIA</a>
            <a href="calculadora.html">CALCULADORA</a>
            <a href="conquistas.html">CONQUISTAS</a>
            <a href="login.html">LOGIN</a>
        </nav>
    </header>

    <div class="cadastro-hero">
        <div class="cadastro-card">
            <h2>criar conta</h2>

            <div class="form-field">
                <label>nome</label>
                <input type="text" id="nome_input" placeholder="seu nome">
            </div>
            <div class="form-field">
                <label>e-mail</label>
                <input type="text" id="email_input" placeholder="seuemail@email.com">
            </div>
            <div class="form-field">
                <label>senha</label>
                <input type="password" id="senha_input" placeholder="******">
            </div>
            <div class="form-field">
                <label>confirmar senha</label>
                <input type="password" id="confirmacao_senha_input" placeholder="******">
            </div>

            <button onclick="cadastrar()">cadastrar</button>

            <div class="error-card" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>

            <div id="div_msg"></div>

            <p class="form-link">já tem conta? <a href="login.html">entrar</a></p>
        </div>
    </div>

    <script>
        function cadastrar() {
            var nomeVar = nome_input.value.trim();
            var emailVar = email_input.value.trim();
            var senhaVar = senha_input.value.trim();
            var confirmacaoSenhaVar = confirmacao_senha_input.value;

            var campos = [
                { valor: nomeVar, nome: "nome" },
                { valor: emailVar, nome: "e-mail" },
                { valor: senhaVar, nome: "senha" },
                { valor: confirmacaoSenhaVar, nome: "confirmação de senha" }
            ];

            for (var i = 0; i < campos.length; i++) {
                if (campos[i].valor == "") {
                    cardErro.style.display = "block";
                    mensagem_erro.innerHTML = `O campo ${campos[i].nome} não pode estar vazio`;
                    setTimeout(sumirMensagem, 5000);
                    return false;
                }
            }

            if (!emailVar.includes("@") || !emailVar.includes(".com")) {
                cardErro.style.display = "block";
                mensagem_erro.innerHTML = "Insira um e-mail válido contendo @ e .com.";
                setTimeout(sumirMensagem, 5000);
                return false;
            }

            if (senhaVar == null || senhaVar.trim() === "") {
                cardErro.style.display = "block";
                mensagem_erro.innerHTML = "A senha não pode ser nula ou vazia.";
                setTimeout(sumirMensagem, 5000);
                return false;
            }

            if (senhaVar !== confirmacaoSenhaVar) {
                cardErro.style.display = "block";
                mensagem_erro.innerHTML = "As senhas não coincidem!";
                setTimeout(sumirMensagem, 5000);
                return false;
            }

            fetch("/usuarios/cadastrar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    nomeServer: nomeVar,
                    emailServer: emailVar,
                    senhaServer: senhaVar,
                }),
            })
                .then(function (resposta) {
                    console.log("resposta: ", resposta);

                    if (resposta.ok) {
                        cardErro.style.display = "block";
                        mensagem_erro.innerHTML = "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

                        setTimeout(() => {
                            window.location = "login.html";
                        }, 2000);
                    } else {
                        throw "Houve um erro ao tentar realizar o cadastro!";
                    }
                })
                .catch(function (resposta) {
                    console.log(`#ERRO: ${resposta}`);
                    cardErro.style.display = "block";
                    mensagem_erro.innerHTML = "Erro ao realizar o cadastro. Tente novamente.";
                });

            return false;
        }

        function sumirMensagem() {
            cardErro.style.display = "none";
        }
    </script>

</body>
</html>
