<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FalleN</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="./css/dashboards.css" />
</head>

<body>

    <header>
        <div class="logo">FURIA</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="historia.html">HISTÓRIA</a>
            <a href="calculadora.html">CALCULADORA</a>
            <a href="conquistas.html">CONQUISTAS</a>
            <a href="quiz.html">QUIZ</a>
        </nav>
    </header>

    <div class="container">

        <h2>Quiz — Resultados</h2>

        <div class="cards">
            <div class="card">
                <p>Melhor Resultado</p>
                <span id="kpi-melhor">—</span>
            </div>
            <div class="card">
                <p>Total de Tentativas</p>
                <span id="kpi-tentativas">—</span>
            </div>
            <div class="card">
                <p>Taxa de Acerto</p>
                <span id="kpi-pct">—</span>
            </div>
        </div>

        <div class="grafico-box">
            <h2>Acertos vs Erros (geral)</h2>
            <canvas id="grafico-pizza"></canvas>
        </div>

    </div>

</body>

</html>

<script>
    var USUARIO_ID = sessionStorage.ID_USUARIO;

    window.onload = obterKpis();

    function obterKpis() {
        fetch('/quiz/kpis/' + USUARIO_ID, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log('Dados recebidos: ' + JSON.stringify(resposta));

                    document.getElementById('kpi-melhor').textContent =
                        resposta.melhor_acertos + '/' + resposta.total_perguntas;
                    document.getElementById('kpi-tentativas').textContent =
                        resposta.total_tentativas;
                    document.getElementById('kpi-pct').textContent =
                        resposta.pct_acerto + '%';

                    plotarPizza(resposta.soma_acertos, resposta.soma_erros);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
        .catch(function (error) {
            console.error('Erro na obtenção dos KPIs: ' + error.message);
        });
    }

    function plotarPizza(acertos, erros) {
        console.log('Iniciando plotagem do gráfico de pizza...');

        var dados = {
            labels: ['Acertos', 'Erros'],
            datasets: [{
                data: [acertos, erros],
                backgroundColor: ['#ffffff', '#333333'],
                borderColor: ['#ffffff', '#555555'],
                borderWidth: 2
            }]
        };

        var config = {
            type: 'doughnut',
            data: dados,
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: { color: '#fff' }
                    },
                    tooltip: {
                        callbacks: {
                            label: function (ctx) {
                                var total = acertos + erros;
                                var pct = ((ctx.raw / total) * 100).toFixed(1);
                                return ctx.label + ': ' + ctx.raw + ' (' + pct + '%)';
                            }
                        }
                    }
                }
            }
        };

        new Chart(document.getElementById('grafico-pizza'), config);
    }
</script>
