<!DOCTYPE html>
<html lang="pt-br">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login - FalleN</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/cadastro.css" />
    <link rel="icon" type="image/png" href="./assets/imgs/badfallen.png">
</head>
<script src="./js/sessao.js"></script>
 
<body>
 
    <header>
        <div class="logo">FALLEN</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="historia.html">HISTÓRIA</a>
            <a href="conquistas.html">CONQUISTAS</a>
            <a href="calculadora.html">CALCULADORA</a>
            <a href="cadastro.html">CADASTRO</a>
        </nav>
    </header>
 
    <div class="cadastro-hero">
        <div class="cadastro-card">
            <h2>Bem-vindo de volta FURIOSO!</h2>
 
            <div class="form-field">
                <label>e-mail</label>
                <input type="text" id="email_input" placeholder="seuemail@email.com">
            </div>
            <div class="form-field">
                <label>senha</label>
                <input type="password" id="senha_input" placeholder="******">
            </div>
 
            <button onclick="entrar()">entrar</button>
 
            <div id="div_msg"></div>
 
            <div class="error-card" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
 
            <p class="form-link">não tem conta? <a href="cadastro.html">cadastrar</a></p>
        </div>
    </div>
 
    <script>
        function entrar() {
            var emailVar = email_input.value;
            var senhaVar = senha_input.value;
 
            if (emailVar == "" || senhaVar == "") {
                cardErro.style.display = "block";
                mensagem_erro.innerHTML = "Preencha todos os campos!";
                setTimeout(sumirMensagem, 5000);
                return false;
            }
 
            fetch("/usuarios/autenticar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    emailServer: emailVar,
                    senhaServer: senhaVar
                })
            }).then(function (resposta) {
                if (resposta.ok) {
                    resposta.json().then(json => {
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id;
 
                        window.location = "./quiz.html";
                    });
                } else {
                    resposta.text().then(texto => {
                        cardErro.style.display = "block";
                        mensagem_erro.innerHTML = texto;
                        setTimeout(sumirMensagem, 5000);
                    });
                }
            }).catch(function (erro) {
                console.log(erro);
            });
 
            return false;
        }
 
        function sumirMensagem() {
            cardErro.style.display = "none";
        }
    </script>
 
</body>
 
</html>
