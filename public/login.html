<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login - FalleN</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">FURIA</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="historia.html">HISTÓRIA</a>
            <a href="calculadora.html">CALCULADORA</a>
            <a href="calculadorakd.html">CONQUISTAS</a>
            <a href="cadastro.html">CADASTRO</a>
        </nav>
    </header>
    <div class="pagina-cadastro">
        <div class="card-cadastro">
            <h2>Bem-vindo de volta FURIOSO!</h2>

            <div class="campo">
                <label>e-mail</label>
                <input type="text" id="email_input" placeholder="seuemail@email.com">
            </div>
            <div class="campo">
                <label>senha</label>
                <input type="password" id="senha_input" placeholder="******">
            </div>

            <button onclick="entrar()">entrar</button>

            <div id="div_msg"></div>

            <p class="link-login">não tem conta? <a href="cadastro.html">cadastrar</a></p>
        </div>
    </div>

   

<script>
function entrar() {
    let email = email_input.value
    let senha = senha_input.value

    if (email == '' || senha == '') {
        div_msg.innerHTML = `preencha todos os campos!`
    } else {
        let nome = sessionStorage.getItem('NOME_USUARIO')
        let emailsalvo = sessionStorage.getItem('EMAIL_USUARIO')

        if (email == emailsalvo) {
            div_msg.innerHTML = `bem-vindo de volta, ${nome}! redirecionando...`
            setTimeout(() => {
                window.location = 'dashboard/dashboard.html'
            }, 2000)
        } else {
            div_msg.innerHTML = `e-mail ou senha incorretos!`
        }
    }
}
</script>
</body>
</html>
